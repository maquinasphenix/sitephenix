name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  deploy_supabase:
    name: Deploy Supabase
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Link project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push database migrations
        continue-on-error: true
        run: supabase db push --password "${SUPABASE_DB_PASSWORD}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Sync email secrets
        run: |
          if [ -n "${RESEND_API_KEY}" ]; then
            supabase secrets set \
              RESEND_API_KEY="${RESEND_API_KEY}" \
              CONTACT_FROM_EMAIL="${CONTACT_FROM_EMAIL}" \
              CONTACT_TO_EMAIL="${CONTACT_TO_EMAIL}" \
              --project-ref "${SUPABASE_PROJECT_REF}"
          else
            echo "RESEND_API_KEY not configured. contact-form will save leads without sending email."
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_FROM_EMAIL: ${{ secrets.CONTACT_FROM_EMAIL }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}

      - name: Deploy google-reviews function
        run: supabase functions deploy google-reviews --project-ref "${SUPABASE_PROJECT_REF}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy contact-form function
        run: supabase functions deploy contact-form --project-ref "${SUPABASE_PROJECT_REF}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
